services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db:/db

    command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 25 && /db/init-db.sh && wait"

volumes:
  sqlserver_data: